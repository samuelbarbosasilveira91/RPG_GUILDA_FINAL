spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=audit
spring.docker.compose.lifecycle-management=start-only

# Elasticsearch (Questão 3)
spring.elasticsearch.uris=http://localhost:9200

# Cache (Questão 2)
spring.cache.type=simple

# Scheduling (para evict do cache)
spring.main.allow-bean-definition-overriding=true

# Timeout para subir os containers (Elasticsearch no emulador é lento)
spring.docker.compose.readiness.timeout=5m
